  brokers_insurance:
    name: 券商 / 保险
    desc: |
      覆盖 broker / insurance / diversified。券商对牛熊敏感，保险跟长端利率 + 准备金
      释放，多元金融（信托 / 期货）跟资本市场活跃度。是金融 beta 的重要补充——
      bank 主题更偏 PB-ROE 价值风格，本主题偏估值弹性 + 市场 beta。
    subtracks:
