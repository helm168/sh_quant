# sh_quant 主题成分股库
#
# 编辑约定：
#   - 每个主题 30-100 只
#   - 同一只股票可在多个主题里（puller 会去重）
#   - stocks 用紧凑 inline 格式：- {code: 600519.SH, name: 贵州茅台}
#   - ts_code 必须带交易所后缀（.SH / .SZ / .BJ）
#   - 想加注释解释为何选这只，就用 yaml 注释（# ...）写在它上面
#
# 子方向（subtrack）约定：
#   传导周期/景气节奏不同的子链，应在 theme 顶层定义 subtracks（id → 显示名），
#   每只股票多写一个 subtrack 字段：
#     subtracks:
#       chip:   AI 芯片 / CPU / SoC / IP
#       memory: HBM / DRAM / 存储 / 内存接口
#     stocks:
#       - {code: 688256.SH, name: 寒武纪, subtrack: chip}
#   研究时按 subtrack 切片做单一同质 universe；跨 subtrack 看景气扩散顺序。
#   已分子方向的主题：ai_compute / ai_data_center_power / semi_equipment /
#                    low_altitude_space。其他主题暂未细分（subtrack 字段可空）。
#
# 数据拉取：
#   python scripts/pull_theme_stocks.py
#
# 注：种子股票仅是常见代表，不是建议买入清单。主题用于景气度/轮动研究，
#     不等于基本面推荐；后续应结合财报、公告、指数成分和流动性继续清洗。

themes:

  # ---------- 科技 / AI ----------

  ai_compute:
