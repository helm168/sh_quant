# sh_quant 主题成分股库
#
# 编辑约定：
#   - 每个主题 30–100 只
#   - 同一只股票可在多个主题里（puller 会去重）
#   - stocks 用紧凑 inline 格式：- {code: 600519.SH, name: 贵州茅台}
#   - 想加注释解释为何选这只，就用 yaml 注释（# ...）写在它上面
#   - ts_code 必须带交易所后缀（.SH / .SZ / .BJ）
#
# 数据拉取：
#   python scripts/pull_theme_stocks.py
#
# 注：种子股票仅是常见代表，不是建议买入清单。补到 30+ 之后再开始研究。

themes:

  # ---------- 科技 / AI ----------

  ai_compute:
    name: AI 算力 / 芯片
    desc: 国产 GPU / NPU、HBM、CoWoS 封装、PCB 高多层板、光通信。受益于 AI 训练/推理需求爆发 + 国产替代。
    stocks:
      - {code: 688256.SH, name: 寒武纪}
      - {code: 688041.SH, name: 海光信息}
      - {code: 688008.SH, name: 澜起科技}
      - {code: 603501.SH, name: 韦尔股份}
      - {code: 300308.SZ, name: 中际旭创}        # 光通信 / 800G
      - {code: 601138.SH, name: 工业富联}        # AI 服务器 ODM
      # TODO 补充：GPU 链 / HBM / 封测 / PCB / 液冷 / 光模块 / 服务器 ODM 子方向

  semi_equipment:
    name: 半导体设备 / 材料
