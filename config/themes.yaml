  us_ai_compute:
    name: 美股 AI 产业链
    desc: |
      美股 AI 产业链全景 (FMP universe, 仅美国上市)。从上游芯片/设备 → 中游服务器/
      网络/光模块 → 下游电源散热/云算力/AI 软件 + 数据中心 REIT 全链覆盖。"卖铲子"
      逻辑下各环节景气有传导顺序: chip 领先, server/network/optical 中游, power/cloud
      承接需求。注意 TSM / ASML / ARM / NBIS(Nebius) / CLS(Celestica) 等不在 FMP
      universe (ADR 或未收录), 故缺失。成分非买入建议, 仅供轮动/景气研究切片。
    subtracks:
      chip:      GPU / CPU / 加速器 / ASIC / 互联 / 模拟
      memory:    存储 / HBM / DRAM / NAND
      foundry:   晶圆代工 / 制造
      equipment: 半导体设备（刻蚀 / 薄膜 / 量测 / 测试 / 材料）
      eda:       EDA / 设计工具
      server:    AI 服务器 / ODM 代工组装
      network:   网络设备 / 高速交换
      optical:   光通信 / 光模块
      connector: 连接器 / 光纤 / 电源模块
      power:     数据中心电源 / 液冷 / 电力供应 / 核电
      cloud:     云 / neocloud / 超大规模 / AI 软件
      reit:      数据中心 REIT
    stocks:
      # chip — GPU / CPU / 加速器 / ASIC / 互联 / 模拟
      - {code: NVDA.US, name: NVIDIA, subtrack: chip}
      - {code: AVGO.US, name: Broadcom, subtrack: chip}
      - {code: AMD.US, name: AMD, subtrack: chip}
      - {code: INTC.US, name: Intel, subtrack: chip}
      - {code: QCOM.US, name: Qualcomm, subtrack: chip}
